name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'src/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'next.config.*'
              - 'postcss.config.*'
              - 'tailwind.config.*'
              - 'vitest.config.*'
              - '.prettierrc*'
              - '.prettierignore'
              - '.github/workflows/ci.yml'
            supabase:
              - 'supabase/**'
              - '.github/workflows/ci.yml'

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npm ci
      - run: npm run build

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supabase:
    # ADR 0023: PR の場合は本 job 内で main / PR それぞれの schema snapshot を取り、
    # 構造化 diff + 規約検査を sticky comment として投稿する。
    # 別 workflow に切り出すと `supabase start` (2 分強) を二重に払うので、
    # ここに集約することで追加コストは `db reset` 1 回 + snapshot + 投稿で +20 秒程度。
    name: Supabase migrations
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # sticky-pull-request-comment が PR にコメントを投稿するために必要。
      # fork PR では GitHub 側で read に降格されるので、その場合は投稿が skip される (job 自体は通る)。
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # base SHA から `supabase/migrations/` をチェックアウトし直すために full history が要る
          fetch-depth: 0
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase local stack (minimal)
        run: |
          supabase start \
            -x studio,inbucket,storage-api,imgproxy,edge-runtime,logflare,vector,pgsodium,realtime
      - name: Lint SQL
        run: supabase db lint
      - name: Reset DB sanity check (re-apply all migrations from scratch)
        # PR では下の本番 deploy 経路再生フローで base 適用 → migration up → snapshot を行うため、
        # ここでの fresh re-apply は冗長。main への push でのみ走らせる sanity check として残す。
        if: github.event_name != 'pull_request'
        run: supabase db reset --no-seed

      # ===== ADR 0023: PR migration diff comment =====
      # PR の場合は本番 `supabase db push` と同じ deploy 経路を再生する:
      #   1. base migrations のみで `db reset` → production の現在状態を再現
      #   2. snapshot (base) を取得
      #   3. HEAD migrations を復元
      #   4. `supabase migration up` で PR 新規分のみを追加適用
      #      → ここで PK 衝突 (同 timestamp prefix) や out-of-order があれば
      #        CLI が production と同じ error で fail し、CI も fail する
      #   5. snapshot (PR) を取得 → diff / 規約検査 / コメント投稿
      # `supabase start` 直後は HEAD migrations 適用済み状態だが、下の base 復元 + db reset で
      # 上書きするので start 直後の状態には依存しない。

      # Supabase local stack は PG 17 を使うので、pg_dump も 17 を入れる。
      # Ubuntu runner default の 16 だと server version mismatch で aborting。
      # db-migrate.yml と同じパターン (pgdg apt repo から install + PATH 先頭に追加)。
      - name: Install PostgreSQL 17 client tools
        if: github.event_name == 'pull_request'
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          test -x /usr/lib/postgresql/17/bin/pg_dump
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Resolve local DB URL
        if: github.event_name == 'pull_request'
        run: |
          supabase status -o env > /tmp/sb.env
          db_url=$(grep '^DB_URL=' /tmp/sb.env | cut -d= -f2- | tr -d '"')
          echo "DATABASE_URL=$db_url" >> "$GITHUB_ENV"

      - name: List new / missing migration files vs base
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mkdir -p /tmp/migration-diff
          # 3-dot 構文 = fork point (merge base) からの差分。「PR ブランチで追加された」分。
          git diff --name-only --diff-filter=A "$BASE_SHA"...HEAD -- supabase/migrations/ \
            > /tmp/migration-diff/new_migrations.txt || true
          # 逆向き: HEAD には無いが base (= main 現 HEAD) にあるファイル = rebase 必要 signal。
          # 3-dot ではなく 2-dot で `git diff HEAD..BASE_SHA --diff-filter=A` を取ると
          # 「HEAD に対して BASE_SHA で追加された」= HEAD に欠けている main の migration が出る。
          git diff --name-only --diff-filter=A HEAD.."$BASE_SHA" -- supabase/migrations/ \
            > /tmp/migration-diff/missing_migrations.txt || true
          echo "new migrations:"
          cat /tmp/migration-diff/new_migrations.txt || true
          echo "missing (need rebase) migrations:"
          cat /tmp/migration-diff/missing_migrations.txt || true

      - name: Restore base migrations and reset DB to base state
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # `git checkout <ref> -- <path>` は overlay モードで動くので、HEAD で新規追加された
          # ファイルを working tree から消してくれない。`git restore` のデフォルトは
          # no-overlay モードなので、`supabase/migrations/` を BASE_SHA と完全一致させ
          # (= PR で追加した migration を物理削除) てから db reset できる。
          git restore --source="$BASE_SHA" --worktree --staged -- supabase/migrations/
          supabase db reset --no-seed

      - name: Snapshot base-state
        if: github.event_name == 'pull_request'
        run: |
          bash scripts/db-migration-diff/snapshot.sh \
            "$DATABASE_URL" /tmp/migration-diff/base.json
          pg_dump --schema-only --schema=public --no-owner --no-privileges \
            --dbname="$DATABASE_URL" > /tmp/migration-diff/base.sql

      - name: Restore HEAD migrations
        if: github.event_name == 'pull_request'
        run: |
          git checkout HEAD -- supabase/migrations/

      - name: Apply PR migrations on top of base (production deploy path)
        # 本番 `supabase db push` と同じ経路: base 適用済みの schema_migrations に対して、
        # PR で追加された migration のみを `supabase migration up` で追加適用する。
        # PK 衝突 (同 timestamp prefix) や out-of-order を CLI が拒否すれば、ここで CI が
        # production と同じ error で fail する。失敗時は exit code がそのまま伝播し job が落ちる。
        if: github.event_name == 'pull_request'
        run: supabase migration up

      - name: Snapshot PR-state (HEAD migrations applied)
        if: github.event_name == 'pull_request'
        run: |
          bash scripts/db-migration-diff/snapshot.sh \
            "$DATABASE_URL" /tmp/migration-diff/pr.json
          pg_dump --schema-only --schema=public --no-owner --no-privileges \
            --dbname="$DATABASE_URL" > /tmp/migration-diff/pr.sql

      - name: Compute schema diff
        if: github.event_name == 'pull_request'
        run: |
          # PostgreSQL 17 の pg_dump は出力先頭 / 末尾に `\restrict <ランダムトークン>` と
          # `\unrestrict <ランダムトークン>` を吐く。トークンは dump のたびに変わるので、
          # 残しておくと「実差分なし」のときも 2 行偽の diff が出てノイズになる。
          # diff を取る前に両方の dump から落として比較する。
          sed -E '/^\\(restrict|unrestrict)[[:space:]]/d' \
            /tmp/migration-diff/base.sql > /tmp/migration-diff/base.normalized.sql
          sed -E '/^\\(restrict|unrestrict)[[:space:]]/d' \
            /tmp/migration-diff/pr.sql > /tmp/migration-diff/pr.normalized.sql
          # diff は差分があれば exit 1。`|| true` で workflow を落とさない
          diff -u /tmp/migration-diff/base.normalized.sql /tmp/migration-diff/pr.normalized.sql \
            > /tmp/migration-diff/schema.diff || true

      - name: Render comment markdown
        if: github.event_name == 'pull_request'
        id: render
        run: |
          # compare.mjs は規約違反があると exit 1。コメント投稿後に fail させたいので
          # ここではいったん exit code を握りつぶし、output に保存する。
          set +e
          node scripts/db-migration-diff/compare.mjs \
            /tmp/migration-diff/base.json \
            /tmp/migration-diff/pr.json \
            /tmp/migration-diff/schema.diff \
            /tmp/migration-diff/new_migrations.txt \
            /tmp/migration-diff/missing_migrations.txt \
            > /tmp/migration-diff/comment.md
          rc=$?
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          echo "::group::Rendered comment"
          cat /tmp/migration-diff/comment.md
          echo "::endgroup::"

      - name: Post sticky comment to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: db-migration-diff
          path: /tmp/migration-diff/comment.md

      - name: Fail if migration assertions raised errors
        if: github.event_name == 'pull_request' && steps.render.outputs.exit_code != '0'
        run: |
          echo "::error::Migration diff の規約チェックで ❌ が検出されました。投稿された PR コメントを確認してください"
          exit 1

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup || true

  e2e:
    # B (sharding): e2e tests を 2 shard に分割し別 runner で並走させる。
    # 各 shard は独自に Supabase を立てる (140s) ため起動コストは shard 数だけ
    # 払うが、test 実行 (51s) が半分に減るので wall は -30s 程度短縮できる。
    # public repo なので分課金は無料。
    name: E2E (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    needs: changes
    if: needs.changes.outputs.node == 'true' || needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # D-(1): docker daemon の layer 並列 DL を 3 → 20 に bump。
      # postgres image は layer が多く、標準の 3 並列だと pull が支配的になる。
      # daemon 設定を上書き → restart して supabase start 前に効かせる。
      - name: Bump docker daemon parallel pull
        run: |
          sudo mkdir -p /etc/docker
          echo '{"max-concurrent-downloads": 20, "max-concurrent-uploads": 20}' \
            | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      # ADR 0011: e2e は本物の Supabase スタック + password sign-in でログインする。
      # auth は必要、studio / storage 等は不要なので最小構成で起動する。
      #
      # Step 並列化: supabase start は image pull + container init で 2m+ かかる
      # ので、background 起動 → npm ci / playwright install を overlap → 後段で
      # 完了を待つ、の順にする。Supabase 起動 (~133s) > install (~30s) なので
      # install のぶん丸ごと隠れる (期待 -30s)。
      - name: Start Supabase local stack (background)
        run: |
          rm -f /tmp/supabase-start.exit /tmp/supabase-start.log
          nohup bash -c '
            supabase start \
              -x studio,inbucket,storage-api,imgproxy,edge-runtime,logflare,vector,pgsodium,realtime
            echo "$?" > /tmp/supabase-start.exit
          ' > /tmp/supabase-start.log 2>&1 &
          echo $! > /tmp/supabase-start.pid
      - name: Install npm deps
        run: npm ci
      # Playwright の browser binary (~/.cache/ms-playwright) を Playwright の
      # version で key 付けして cache する。version が変わったら自動で miss する。
      # cache hit でも system deps (apt) は別途 install-deps で入れる必要がある
      # (apt 部分は数秒なので browser DL の 25s と比べると誤差)。
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi
      # background の supabase start が完了するまで待つ。pid が消えたら exit
      # code を読み、log を出力する (失敗時の診断)。
      - name: Wait for Supabase to be ready
        run: |
          pid=$(cat /tmp/supabase-start.pid)
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          if [ ! -f /tmp/supabase-start.exit ]; then
            echo "::error::supabase start did not record exit code"
            cat /tmp/supabase-start.log || true
            exit 1
          fi
          code=$(cat /tmp/supabase-start.exit)
          cat /tmp/supabase-start.log
          if [ "$code" -ne 0 ]; then
            echo "::error::supabase start exited with code $code"
            exit "$code"
          fi
      - name: Export Supabase keys into env
        run: |
          supabase status -o env > /tmp/sb.env
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(grep '^API_URL=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(grep '^ANON_KEY=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' /tmp/sb.env | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_ENV"
      - name: Run Playwright
        env:
          E2E_TEST_USER_EMAIL: e2e@kozutsumi.local
          E2E_TEST_USER_PASSWORD: e2e-ci-password
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # shard ごとに別 artifact 名で upload する (同名は upload-artifact@v4 で衝突)。
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup || true
